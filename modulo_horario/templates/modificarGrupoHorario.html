
{% extends "base.html" %}

{% block title %}Modificar grupo horario{% endblock %}

{% block content %}
       <div class="col d-flex flex-column h-sm-100">
            <main class="row overflow-auto">
              <div class="container-fluid col">
                <div class="px-lg-2 mx-lg-2 py-0 my-0">
  
                  <div class="container-fluid m-0 p-0">
  
                    <div class="row align-items-center mx-0 px-0" style="overflow-x: hidden; margin-top: 35px;">
  
                      <div class="container justify-content-center">
                        <div class="container">
  
  
                          <div id="contenedorSub" style=" padding: 20px; background-color: white; margin-top: 20px; height: auto; border-radius: 5px; ">
  
  
                            <!-- TÍTULO -->
                        
                            <div class="box-tittle">
                                <button type="button" class="regresarBtn">
                                  <a href="{% url 'gestionarGrupoHorario' %}"><img id="closeicon" src="/static/iconos/regresar.PNG" width="32px" height="27px"></a>
                                </button>
                                <h3 id="titulo" style="margin-left: 20px; display: inline;">MODIFICAR GRUPO HORARIO</h3>
                            
                            </div>
  
                          <br>
                          <br>                             
                        
                        <form class="row g-3" method="post" autocomplete="off">
  
                          {% csrf_token %}
                          <div class="col-md-6">
                            <label for="grupo" class="form-label">Grupo:</label>
                          <input type="text" class="form-control" name="grupo" id="grupo" value="{{ grupo_horario.grupo }}" required pattern="[A-Za-z]" title="Solo se permiten letras">    
                          </div>

                          <div class="col-md-6">
                            <label for="capacidad" class="form-label">Capacidad:</label>
                          <input type="number" name="capacidad" id="capacidad" class="form-control" value="{{ grupo_horario.capacidad }}" required>
                          </div>
                          
                          <div class="col-md-6" >
                            <label for="ciclo" class="form-label">Ciclo:</label>
                            <select class="form-select" name="ciclo" id="ciclo" required>
                              {% for ciclo in ciclos %}
                              <option value="{{ ciclo }}" {% if ciclo == grupo_horario.fk_ciclo.cic_año|add:" - "|add:grupo_horario.fk_ciclo.cic_semestre %}selected{% endif %}>{{ ciclo }}</option>
                              {% endfor %}
                            </select>
                          </div>

                          <div class="col-md-6">
                          <label for="curso" class="form-label">Curso:</label>
                          <select class="form-select" name="curso" id="curso" required>
                              {% for curso in cursos %}
                              <option value="{{ curso }}" {% if curso == grupo_horario.fk_curso.nombre_curso %}selected{% endif %}>{{ curso }}</option>
                              {% endfor %}
                          </select>
                        </div>

                        <div class="col-12" style="text-align: right;">
                          <br>
                          <button class="btnCancel" style="margin-right: 5px;" onclick="window.location.href='{% url 'gestionarGrupoHorario' %}'">Cancelar</button>
                          <button type="submit" class="btnVer">Modificar</button>
                        </div>
                        <!--
                          <button type="submit">Guardar Cambios</button>
                      -->
                      </form>
                        
                        
                        </div>
                      
                        </div>                      
                      </div>
  
                    </div>
              </div>
            </main>
          </div>
  
        </div>
  
      </div>
  
    </div>
  

    {% endblock %}

  {% block extra_js %}


<script defer>
    document.addEventListener('DOMContentLoaded', function() {
    const checkbox = document.getElementById('estado');
    const hiddenInput = document.querySelector('input[name="estado"][type="hidden"]');
    
    checkbox.addEventListener('change', function() {
        if (this.checked) {
            hiddenInput.value = 'D'; 
        } else {
            hiddenInput.value = 'I'; 
        }
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const contratoSelect = document.getElementById('ciclo');
    const tipoContrato = '{{ grupoHorario.0.2 }}';

    // Seleccionar el tipo de contrato automáticamente
    if (tipoContrato) {
        contratoSelect.value = tipoContrato;
    }
});

document.addEventListener('DOMContentLoaded', function() {
    const contratoSelect = document.getElementById('curso');
    const tipoContrato = '{{ grupoHorario.0.3 }}';

    // Seleccionar el tipo de contrato automáticamente
    if (tipoContrato) {
        contratoSelect.value = tipoContrato;
    }
});

</script>

{% endblock %}
