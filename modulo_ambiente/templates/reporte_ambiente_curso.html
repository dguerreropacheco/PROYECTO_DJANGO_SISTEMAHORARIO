
{% extends "base.html" %}

{% block title %}Reporte de ambientes por curso{% endblock %}

{% block content %}

                <div class="col d-flex flex-column h-sm-100">
                    <main class="row overflow-auto">
                        <div class="container-fluid col">
                            <br>
                            <form class="px-lg-2 mx-lg-2 py-0 my-0">
                                <div class="container-fluid m-0 p-0">
                                    <div class="row align-items-center mx-0 px-0"
                                        style="overflow-x: hidden; margin-top: 5px; margin-bottom: 20;">
                                        <div class="container justify-content-center">
                                            <div class="row">
                                                <section class="content-info"
                                                    style="margin-top: 5px; margin-bottom: 30px">
                                                    <div class="container">
                                                        <div class="card mb-3">
                                                            <div class="card-body">
                                                                <div class="box-tittle">
                                                                    <button type="button" class="regresarBtn">
                                                                        <a href="/inicio"><img id="closeicon"
                                                                                src="/static/iconos/regresar.PNG"
                                                                                width="32px" height="27px"></a>
                                                                    </button>
                                                                    <h3 id="titulo"
                                                                        style="margin-left: 20px;">REPORTE DE AMBIENTES 
                                                                        POR CURSO</h3>
                                                                    <br>
                                                                    <br>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <hr>
                                                        <div class="card">
                                                            <div class="card-body">
                                                                <h3>Resumen de ambientes por curso</h3>
                                                                <div style="overflow-x:auto; max-height:600px; overflow-y:auto;">
                                                                    <table id="resumenAsignaciones" class="table table-striped table-bordered">
                                                                    </table>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <hr>
                                                    </div>
                                                </section>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </main>
                </div>
            </div>
        </div>
    </div>

    {% endblock %}


    
   {% block extra_js %}

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"
        integrity="sha512-7Pi/otdlbbCR+LnW+F7PwFcSDJOuUJB3OxtEHbg4vSMvzvJjde4Po1v4BR9Gdc9aXNUNFVUY+SK51wWT8WF0Gg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

    <script>
        let ambientesSeleccionados = [];

        document.addEventListener('DOMContentLoaded', function () {
            fetchResumenAsignaciones()
            fetch('/datos-reporte-ambiente-curso/')
                .then(response => response.json())
                .then(data => {
                    const labels = data.map(item => item.fk_grupo_horario__fk_curso__nombre_curso);
                    const valores = data.map(item => item.total);

                    const ctx = document.getElementById('ambientesPorCursoChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Número de Ambientes',
                                data: valores,
                                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                                borderColor: 'rgba(54, 162, 235, 1)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                })
                .catch(error => console.error('Error fetching data:', error));
        });

        function fetchResumenAsignaciones() {
            fetch('/datos-reporte-ambiente-curso/')
                .then(response => response.json())
                .then(data => {
                    const resumenTable = document.getElementById('resumenAsignaciones');
                    resumenTable.innerHTML = ''; // Limpiar la tabla antes de agregar nuevos elementos

                    // Estructurar los datos por escuela
                    const escuelas = {};
                    data.forEach(item => {
                        const escuelaNombre = item['fk_grupo_horario__fk_curso__nombre_curso'];
                        const ambienteNombre = item['ambiente__nombre_ambiente'];

                        if (!escuelas[escuelaNombre]) {
                            escuelas[escuelaNombre] = [];
                        }
                        escuelas[escuelaNombre].push(ambienteNombre);
                    });

                    // Crear el encabezado de la tabla
                    const thead = document.createElement('thead');
                    const headerRow = document.createElement('tr');
                    Object.keys(escuelas).forEach(escuelaNombre => {
                        const th = document.createElement('th');
                        th.textContent = escuelaNombre;
                        headerRow.appendChild(th);
                    });
                    thead.appendChild(headerRow);
                    resumenTable.appendChild(thead);

                    // Crear el cuerpo de la tabla
                    const tbody = document.createElement('tbody');
                    const maxAmbientes = Math.max(...Object.values(escuelas).map(aulas => aulas.length));

                    for (let i = 0; i < maxAmbientes; i++) {
                        const row = document.createElement('tr');
                        Object.keys(escuelas).forEach(escuelaNombre => {
                            const td = document.createElement('td');
                            td.textContent = escuelas[escuelaNombre][i] || '';
                            row.appendChild(td);
                        });
                        tbody.appendChild(row);
                    }
                    resumenTable.appendChild(tbody);
                })
                .catch(error => console.error('Error fetching resumen:', error));
        }
    </script>

{% endblock %}
