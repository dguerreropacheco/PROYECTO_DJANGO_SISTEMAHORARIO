<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; }
        .container { display: flex; width: 100%; }
        .left-panel { background-color: #E33439; width: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .logo { width: 100%; height: 100%; object-fit: cover; }
        .right-panel { width: 50%; display: flex; justify-content: center; align-items: center; background-color: #E33439; }
        .login-container { background-color: white; padding: 40px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); text-align: center; width: 300px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #E33439; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #E33439; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #c72a2f; }
        #error-message { margin-top: 15px; color: #E33439; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <img src="/static/iconos/docente.jpg" alt="Logo" class="logo">
        </div>
        <div class="right-panel">
            <div class="login-container">
                <h2>INICIAR SESIÓN</h2>

                <form id="loginForm" method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="username">Usuario:</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit">Acceder</button>
                    
                    <p style="margin-top: 15px;">
                        ¿No tienes cuenta? <a href="/registro" style="color: #E33439;">Regístrate aquí</a>
                    </p>
                </form>

                {% if error %}
                <div id="error-message">{{ error }}</div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
